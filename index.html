<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Credit Kaagapay SEO 周报</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --primary: #0ea5e9; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); padding: 40px 24px; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .report-list { list-style: none; }
  .report-list li { margin-bottom: 12px; }
  .report-list a {
    display: block; padding: 16px 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--primary); text-decoration: none; font-size: 15px;
    transition: border-color 0.2s;
  }
  .report-list a:hover { border-color: var(--primary); }
  .report-list .date { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .empty { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<h1>Credit Kaagapay SEO 周报</h1>
<p class="subtitle">每周一自动更新 | Google Search Console 数据</p>
<ul class="report-list" id="reports">
  <li><span class="empty">加载中...</span></li>
</ul>
<script>
// Auto-discover reports from known naming pattern
// Since GitHub Pages is static, we maintain a simple list
const reports = [
  { date: '2026-03-27', file: 'gsc_weekly_report/reports/weekly_report_2026-03-27.html' },
  { date: '2026-03-24', file: 'gsc_weekly_report/reports/weekly_report_2026-03-24.html' }
];
const ul = document.getElementById('reports');
if (reports.length === 0) {
  ul.innerHTML = '<li><span class="empty">暂无报告</span></li>';
} else {
  ul.innerHTML = reports.map(r =>
    `<li><a href="${r.file}">SEO 周报 - ${r.date}<div class="date">报告周期截至 ${r.date}</div></a></li>`
  ).join('');
}
</script>
</body>
</html>
